<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect width="64" height="64" rx="14" fill="url(#shine)"/>

  <!-- Building body -->
  <rect x="12" y="22" width="40" height="30" rx="2" fill="white" fill-opacity="0.95"/>

  <!-- Roof / pediment -->
  <polygon points="8,23 32,8 56,23" fill="white" fill-opacity="0.7"/>

  <!-- Columns hint (vertical lines) -->
  <rect x="18" y="28" width="3" height="18" rx="1" fill="#1d4ed8" fill-opacity="0.5"/>
  <rect x="26" y="28" width="3" height="18" rx="1" fill="#1d4ed8" fill-opacity="0.5"/>
  <rect x="35" y="28" width="3" height="18" rx="1" fill="#1d4ed8" fill-opacity="0.5"/>
  <rect x="43" y="28" width="3" height="18" rx="1" fill="#1d4ed8" fill-opacity="0.5"/>

  <!-- Door -->
  <rect x="27" y="38" width="10" height="14" rx="1.5" fill="#1d4ed8" fill-opacity="0.85"/>
  <!-- Door knob -->
  <circle cx="35" cy="45.5" r="1.2" fill="white" fill-opacity="0.9"/>

  <!-- Ground line -->
  <rect x="8" y="52" width="48" height="2.5" rx="1.25" fill="white" fill-opacity="0.4"/>
</svg>
